<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>landing-launchpad</title>
</head>

<body>
<header>
    <nav>
        <h4>RHR🪓</h4>
        <button class="btn">Sign Up</button>
    </nav>
    <section class="banner">
        <h1>Cool Dark UI Template for Webflow Agencies!</h1>
        <button class="btn">Stay Focused</button>
    </section>
</header>
<main>
    <section class="action">
        <div class="action-box">
            <h3>See It in Action</h3>
            <p>Explore the live preview and imagine your brand in this bold new look.</p>
             <button class="btn">Launch Live Preview</button>
        </div>
        <div class="action-box">
            <img src="./Assets/wc-mini.png" alt="">
        </div>
    </section>
    <section class="Productive">
        <h1>Joined Thousands of Productive Users</h1>
        <div class="productive-info">
            <div class="info-box">
                <h1>50K</h1>
                <p>Active Users</p>
            </div>
            <div class="info-box">
                <h1>2M+</h1>
                <p>Focus Sessions</p>
            </div>
            <div class="info-box">
                <h1>95%</h1>
                <p>Satisfaction Rate</p>
            </div>
        </div>
    </section>
</main>
</body>

</html>
